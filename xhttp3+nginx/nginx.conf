server {
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;
    listen 443 ssl;
    listen [::]:443 ssl;    
    http2 on;
    server_name xxxxx;
    ssl_certificate     /etc/xray/fullchain.pem;
    ssl_certificate_key /etc/xray/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    location /xxxxx {
        grpc_pass grpc://127.0.0.1:11111;
        grpc_set_header Host $host;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass https://bing.com;
        proxy_set_header Host            bing.com;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0.0.0 Safari/537.36";
        proxy_cookie_domain bing.com xxxx;
        proxy_redirect      https://bing.com/ https://xxxxx/;
        proxy_redirect      https://bing.com/ https://xxxxx/;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    10s;
#        root /var/www/html;
#        index index.html index.htm;
        add_header Alt-Svc 'h3=":443"; ma=86400';
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    location /download/ {
        alias           /download/;
        autoindex       on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
    sendfile on;
    tcp_nopush on;
}

server {
    listen 80;
    listen [::]:80;
    server_name xxxxx;
    if ($host = xxxxx) {
        return 301 https://$host$request_uri;
    }
}