   server {
        listen 80;
        listen [::]:80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_reject_handshake on;
    }

    server {
        listen 443 quic reuseport;
        listen [::]:443 quic reuseport;
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name 111111111111111111111;

        ssl_certificate /etc/xray/fullchain.pem;
        ssl_certificate_key /etc/xray/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305; #若证书为 RSA 证书，所有 ECDSA 改为 RSA。
        ssl_prefer_server_ciphers on;

        location /1111111111 {
            grpc_pass grpc://127.0.0.1:2023;
            grpc_set_header Host $host;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            add_header Alt-Svc 'h3=":443"; ma=86400';
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; #启用 HSTS
            root /var/www/html;
            index index.html index.htm;
        }
}
