stream {

    upstream web {
        server 127.0.0.1:8443;
        server [::1]:8443;
    }
    upstream xray {
        server 127.0.0.1:20000;
        server [::1]:20000;
    }

    map $ssl_preread_server_name $backend {
        xxxxx xray;
        default web;
    }

    server {
        listen 443 tcp;
        listen [::]:443 tcp;
        ssl_preread on;
        proxy_pass $backend;
    }
}



